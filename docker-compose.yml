
services:

  postgres:
    image: postgres:16
    container_name: swiftpay-postgres

    environment:
      POSTGRES_DB: swiftpay
      POSTGRES_USER: swiftpay
      POSTGRES_PASSWORD: swiftpay

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swiftpay"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: swiftpay-zookeeper

    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: swiftpay-kafka

    depends_on:
      - zookeeper

    ports:
      - "9092:9092"

    environment:
      KAFKA_BROKER_ID: 1

      KAFKA_ZOOKEEPER_CONNECT:
        zookeeper:2181

      KAFKA_ADVERTISED_LISTENERS:
        PLAINTEXT://kafka:9092,
        PLAINTEXT_HOST://localhost:29092

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:
        PLAINTEXT:PLAINTEXT,
        PLAINTEXT_HOST:PLAINTEXT

      KAFKA_INTER_BROKER_LISTENER_NAME:
        PLAINTEXT

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: swiftpay-kafka-ui

    depends_on:
      - kafka

    ports:
      - "8085:8080"

    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS:
        kafka:9092

  redis:
    image: redis:7
    container_name: swiftpay-redis

    ports:
      - "6379:6379"

  transaction-gateway:
    build:
      context: ./transaction-gateway

    container_name: transaction-gateway

    depends_on:
      postgres:
        condition: service_healthy

      kafka:
        condition: service_started

      redis:
        condition: service_started

    ports:
      - "8080:8080"

  ledger-service:
    build:
      context: ./ledger-service

    container_name: ledger-service

    depends_on:
      postgres:
        condition: service_healthy

      kafka:
        condition: service_started

    ports:
      - "8081:8081"

  analytics-worker:
    build:
      context: ./analytics-worker

    container_name: analytics-worker

    depends_on:
      postgres:
        condition: service_healthy

      kafka:
        condition: service_started

    ports:
      - "8082:8082"

volumes:
  postgres-data: