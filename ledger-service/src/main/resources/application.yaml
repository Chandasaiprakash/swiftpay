server:
  port: 8081

spring:
  application:
    name: ledger-service

  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://postgres:5432/swiftpay
    username: swiftpay
    password: swiftpay
    driver-class-name: org.postgresql.Driver

    hikari:
      # Increase the max pool size from the default 10 to 50
      maximum-pool-size: 50
      # Allow threads to wait up to 15 seconds to grab a connection before failing
      connection-timeout: 15000
      # Ensure connections aren't recycled too aggressively during the test
      minimum-idle: 20
      idle-timeout: 300000
      max-lifetime: 1800000

      # Optimize Tomcat container thread pool to handle concurrent virtual users
  server:
    tomcat:
      threads:
        max: 200
        min-spare: 20

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: kafka:9092
    consumer:
      group-id: ledger-service-group
      auto-offset-reset: earliest
      enable-auto-commit: false
      # Change these to standard deserializers to unblock programmatic overrides
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics

logging:
  level:
    root: WARN