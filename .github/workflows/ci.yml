name: SwiftPay CI Pipeline

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main
      - develop

jobs:

  build-and-test:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - transaction-gateway
          - ledger-service
          - analytics-worker

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Grant Execute Permission
        run: chmod +x mvnw
        working-directory: ./${{ matrix.service }}

      - name: Build and Test
        run: ./mvnw clean verify
        working-directory: ./${{ matrix.service }}