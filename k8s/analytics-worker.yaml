apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-worker
  namespace: swiftpay

spec:
  replicas: 2

  selector:
    matchLabels:
      app: analytics-worker

  template:
    metadata:
      labels:
        app: analytics-worker

    spec:
      containers:
        - name: analytics-worker
          image: analytics-worker:latest

          ports:
            - containerPort: 8082

          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/swiftpay

            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: swiftpay-secret
                  key: POSTGRES_USERNAME

            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: swiftpay-secret
                  key: POSTGRES_PASSWORD

            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: kafka:9092

            - name: SPRING_DATA_REDIS_HOST
              value: redis
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-worker
  namespace: swiftpay

spec:
  selector:
    app: analytics-worker

  ports:
    - port: 8082
      targetPort: 8082

  type: LoadBalancer