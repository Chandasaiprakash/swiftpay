apiVersion: apps/v1
kind: Deployment
metadata:
  name: transaction-gateway
  namespace: swiftpay

spec:
  replicas: 2

  selector:
    matchLabels:
      app: transaction-gateway

  template:
    metadata:
      labels:
        app: transaction-gateway

    spec:
      containers:
        - name: transaction-gateway
          image: transaction-gateway:latest

          ports:
            - containerPort: 8080

          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/swiftpay

            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: swiftpay-secret
                  key: POSTGRES_USERNAME

            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: swiftpay-secret
                  key: POSTGRES_PASSWORD

            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: kafka:9092

            - name: SPRING_DATA_REDIS_HOST
              value: redis
---
apiVersion: v1
kind: Service
metadata:
  name: transaction-gateway
  namespace: swiftpay

spec:
  selector:
    app: transaction-gateway

  ports:
    - port: 8080
      targetPort: 8080

  type: LoadBalancer