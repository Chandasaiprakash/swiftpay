apiVersion: apps/v1
kind: Deployment
metadata:
  name: ledger-service
  namespace: swiftpay

spec:
  replicas: 2

  selector:
    matchLabels:
      app: ledger-service

  template:
    metadata:
      labels:
        app: ledger-service

    spec:
      containers:
        - name: ledger-service
          image: ledger-service:latest

          ports:
            - containerPort: 8081

          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://postgres:5432/swiftpay

            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: swiftpay-secret
                  key: POSTGRES_USERNAME

            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: swiftpay-secret
                  key: POSTGRES_PASSWORD

            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: kafka:9092

            - name: SPRING_DATA_REDIS_HOST
              value: redis
---
apiVersion: v1
kind: Service
metadata:
  name: ledger-service
  namespace: swiftpay

spec:
  selector:
    app: ledger-service

  ports:
    - port: 8081
      targetPort: 8081

  type: LoadBalancer