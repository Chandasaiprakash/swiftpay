server:
  port: 8082

spring:
  application:
    name: analytics-worker

  datasource:
    url: jdbc:postgresql://postgres:5432/swiftpay
    username: swiftpay
    password: swiftpay
    driver-class-name: org.postgresql.Driver

  threads:
    virtual:
      enabled: true

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: false

    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: kafka:9092

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics

logging:
  level:
    root: WARN