server:
  port: 8080

spring:
  application:
    name: transaction-gateway
  datasource:
    url: jdbc:postgresql://localhost:5432/swiftpay?guc_time_zone=UTC
    username: swiftpay
    password: swiftpay
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: localhost:9092

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

      properties:
        linger.ms: 5
        batch.size: 32768
        compression.type: snappy

  data:
    redis:
      host: localhost
      port: 6379

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null


management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics

  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO