server:
  port: 8080

spring:
  application:
    name: transaction-gateway
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:postgresql://postgres:5432/swiftpay
    username: swiftpay
    password: swiftpay
    driver-class-name: org.postgresql.Driver

    hikari:
      # Increase the max pool size from the default 10 to 50
      maximum-pool-size: 50
      # Allow threads to wait up to 15 seconds to grab a connection before failing
      connection-timeout: 15000
      # Ensure connections aren't recycled too aggressively during the test
      minimum-idle: 20
      idle-timeout: 300000
      max-lifetime: 1800000

      # Optimize Tomcat container thread pool to handle concurrent virtual users
  server:
    tomcat:
      threads:
        max: 200
        min-spare: 20

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: kafka:9092

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

      properties:
        linger.ms: 5
        batch.size: 32768
        compression.type: snappy

  data:
    redis:
      host: redis
      port: 6379

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null


management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,metrics

  endpoint:
    health:
      show-details: always

logging:
  level:
    root: WARN